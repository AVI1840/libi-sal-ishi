[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "marketplace"
version = "0.1.0"
description = "Personal Basket - Care Services Marketplace"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "shared",
    "fastapi>=0.109.0",
    "uvicorn[standard]>=0.27.0",
    "python-multipart>=0.0.6",
    "structlog>=24.1.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.4.0",
    "pytest-asyncio>=0.23.0",
    "pytest-cov>=4.1.0",
    "httpx>=0.26.0",
]

[tool.hatch.build.targets.wheel]
packages = ["marketplace"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
